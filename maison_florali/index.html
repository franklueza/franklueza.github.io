<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maison Florali</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold-dark:  #69531b;
      --gold:       #c2a66e;
      --brown:      #6c5336;
      --black:      #1d1b1e;
      --cream:      #efebe0;
    }

    html, body {
      height: 100%;
      background: var(--black);
      overflow-x: hidden;
    }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: saturate(0.75) brightness(0.7);
    }

    .hero-video-mobile { display: none; }

    @media (max-width: 768px) {
      .hero-video-desktop { display: none; }
      .hero-video-mobile  { display: block; }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      /*background:
        linear-gradient(to bottom,
          rgba(29,27,30,0.6)  0%,
          rgba(29,27,30,0.1) 30%,
          rgba(29,27,30,0.1) 70%,
          rgba(29,27,30,0.65) 100%
        );*/
    }

    .hero-grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
    }

    .hero-logo {
      position: absolute;
      top: clamp(28px, 5vh, 52px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: clamp(100px, 13vw, 160px);
      opacity: 0;
    }

    @media (max-width: 768px) {
      .hero-logo {
        left: 24px;
        transform: translateX(0);
        width: clamp(72px, 20vw, 100px);
      }
    }

    .hero-logo img {
      width: 100%;
      display: block;
      mix-blend-mode: lighten;
      filter: brightness(1.05);
    }

    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
    }

    .scroll-hint span {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: 1rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(239,235,224,0.45);
    }

    .scroll-line {
      width: 1px;
      height: 44px;
      background: linear-gradient(to bottom, #c2a66e, transparent);
      animation: pulse 2.2s ease-in-out infinite;
      transform-origin: top;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.85); }
      50%       { opacity: 1;   transform: scaleY(1);    }
    }

    /* ══ ABOUT ═══════════════════════════════════════════ */
    #about {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: clamp(60px, 10vh, 120px) clamp(24px, 8vw, 80px);
    }

    .about-inner {
      text-align: center;
      max-width: 680px;
    }

    .about-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .about-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .about-line.r {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .about-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .about-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      line-height: 1;
      margin-bottom: 10px;
    }

    .about-sub {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(0.6rem, 1vw, 0.75rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 52px;
    }

    .about-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.4rem, 2.8vw, 2.1rem);
      color: var(--brown);
      line-height: 1.4;
      margin-bottom: 44px;
    }

    .about-rule {
      width: 1px;
      height: 52px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto 44px;
    }

    .about-concept {
      font-family: 'EB Garamond', serif;
      font-size: clamp(1rem, 1.5vw, 1.15rem);
      font-weight: 400;
      line-height: 1.9;
      color: rgba(29,27,30,0.65);
      letter-spacing: 0.02em;
    }

    @media (max-width: 768px) {
      .about-concept br { display: none; }
    }
  </style>
</head>
<body>
<section id="hero">

  <!-- Desktop -->
  <video class="hero-video hero-video-desktop" autoplay muted loop playsinline>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <!-- Mobile -->
  <video class="hero-video hero-video-mobile" autoplay muted loop playsinline>
    <source src="video2.mp4" type="video/mp4">
  </video>

  <div class="hero-overlay"></div>
  <div class="hero-grain"></div>

  <div class="hero-logo" id="logo">
    <img src="Logo_Maison_Florali.png" alt="Maison Florali">
  </div>

  <div class="scroll-hint" id="scrollHint">
    <span>Descubrir</span>
    <div class="scroll-line"></div>
  </div>

</section>




<!-- ══════════════════ ABOUT ══════════════════ -->
<section id="about">

  <div class="about-inner">

    <div class="about-ornament" id="aboutOrn">
      <!--div class="about-line"></div>
      <div class="about-diamond"></div>
      <div class="about-line r"></div-->
    </div>

    <h2 class="about-name" id="aboutName">Maison Florali</h2>
    <p class="about-sub" id="aboutSub">Estudio de Diseño Floral de Autor</p>

    <p class="about-tagline" id="aboutTagline">"Hacemos florecer tus momentos"</p>

    <!--div class="about-rule" id="aboutRule"></div-->

    <p class="about-concept" id="aboutConcept">
      Maison Florali es un estudio de diseño floral de autor que transforma<br>
      emociones en piezas únicas. No somos una florería tradicional —<br>
      somos una marca estética, íntima y sofisticada.
    </p>

  </div>

</section>


<script>
  gsap.registerPlugin(ScrollTrigger);

  /* ── Smooth scroll con JS + GSAP ticker ── */
  (() => {
    const lerp = (a, b, t) => a + (b - a) * t;
    let scrollY   = window.scrollY;
    let targetY   = window.scrollY;
    let bodyH     = () => document.body.scrollHeight - window.innerHeight;

    window.addEventListener('scroll', () => { targetY = window.scrollY; }, { passive: true });

    gsap.ticker.add(() => {
      scrollY = lerp(scrollY, targetY, 0.09);
      if (Math.abs(scrollY - targetY) < 0.1) scrollY = targetY;
      ScrollTrigger.update();
    });

    gsap.ticker.lagSmoothing(0);
  })();

  /* ── HERO ── */
  gsap.fromTo('.hero-video-desktop, .hero-video-mobile',
    { scale: 1.06 },
    { scale: 1, duration: 3, ease: 'power2.out' }
  );

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.fromTo('#logo',
    { y: -20, opacity: 0 },
    { y: 0, opacity: 1, duration: 1.4, delay: 0.6 }
  )
  .fromTo('#scrollHint',
    { opacity: 0, y: 8 },
    { opacity: 1, y: 0, duration: 1 },
    '-=0.2'
  );

  /* ── ABOUT ── */
  /* ── ABOUT: entrada suave con GSAP ── */
  gsap.set(['#aboutOrn','#aboutName','#aboutSub','#aboutTagline','#aboutRule','#aboutConcept'], 
    { opacity: 0, y: 30 }
  );
  gsap.set('#aboutOrn', { scaleX: 0, y: 0 });

  ScrollTrigger.create({
    trigger: '#about',
    start: 'top 85%',
    onEnter: () => {
      gsap.timeline({ defaults: { ease: 'power3.out' } })
        .to('#aboutOrn',
          { scaleX: 1, opacity: 1, duration: 0.8, transformOrigin: 'center' }
        )
        .to('#aboutName',
          { y: 0, opacity: 1, duration: 0.9 }, '-=0.3'
        )
        .to('#aboutSub',
          { y: 0, opacity: 1, duration: 0.7 }, '-=0.6'
        )
        .to('#aboutTagline',
          { y: 0, opacity: 1, duration: 0.9 }, '-=0.5'
        )
        .to('#aboutRule',
          { y: 0, opacity: 1, duration: 0.6, scaleY: 1, transformOrigin: 'top' }, '-=0.5'
        )
        .to('#aboutConcept',
          { y: 0, opacity: 1, duration: 0.9 }, '-=0.5'
        );
    }
  });

</script>
</body>
</html>
